name: YouTube Shorts Pipeline

on:
  schedule:
    # Runs at 5:00 AM IST (11:30 PM UTC previous day)
    - cron: '30 23 * * *'
    # Runs at 2:00 PM IST (8:30 AM UTC)
    - cron: '30 8 * * *'
  
  # Allow manual trigger anytime
  workflow_dispatch:

jobs:
  generate-short:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Step 1 - Get your code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2 - Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 3 - Install system dependencies
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core
          fc-cache -f -v

      # Step 4 - Install Python libraries
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            google-generativeai \
            pytrends \
            requests \
            moviepy \
            edge-tts \
            Pillow \
            numpy \
            newsapi-python

      # Step 5 - Run the pipeline
      - name: Run YouTube Shorts Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd src
          python main.py

      # Step 6 - Upload video as artifact (backup download)
      - name: Upload video artifact
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: youtube-short-${{ github.run_number }}
          path: |
            src/output_video.mp4
            src/script.json
          retention-days: 3
